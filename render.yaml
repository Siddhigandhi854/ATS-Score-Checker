services:
  # Web Service
  - type: web
    name: ats-score-checker
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    
    # Environment variables (set these in Render dashboard)
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
    
    # Health check
    healthCheckPath: /
    
    # Build and deployment settings
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - server.js
        - views/**
    
    # Add-ons
    addons: []
